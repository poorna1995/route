# Shared Phase A config — auto-merged into candidates/*.yaml (see setting.load_setting).
# Frozen per-run snapshot: experiments/runs/<run_id>/setting.yaml

partition:
  method: split_dataset
  seed: 42
  selection_holdout_n: 150
  test_fraction: 0.20
  test_min: 150
  test_max: 1000

# M1: applied when |C_raw| > subsample_when_above (e.g. MMLU-Pro)
corpus_preparation:
  subsample_when_above: 5000
  target_size: 2000
  stratify_metadata_key: subject

pool:
  deployment_scenario: model_pool
  M_lo: meta-llama/Llama-3.2-3B-Instruct
  M_hi: meta-llama/Llama-3.1-8B-Instruct
  kappa: null

protocol:
  protocol_version: mcq_letter
  system_prompt: |
    You answer multiple-choice questions.

    Rules:
    - Read the question and all options carefully.
    - Reply with exactly one line containing only the letter label of the correct option (A, B, C, …).
    - Do not include explanation, punctuation, or any other text.
  user_template: |
    {question}

    {choices}

    Answer:
  decoding:
    do_sample: false
    temperature: 0.0
    max_tokens: 16
  scoring:
    method: first_token_letter
  grading:
    method: mcq

gates:
  min_accuracy_gap: 0.03
  opportunity_min: 0.05
  too_hard_max: 0.70

selection:
  tie_break:
    order: [acc_gap, opportunity_rate]
    prefer: [ARC-Challenge, MMLU_PRO]
