# Phase A (M1) defaults — merged into experiments/candidates/*.yaml at load time.
# Pool, protocol, partition policy, gates, and tie-break are frozen before M2.
# Run snapshots (experiments/runs/*/setting.yaml) are always fully expanded.

partition:
  method: random_split
  seed: 42
  selection_holdout_n: 150 # M1/M2 — fixed pilot size on every benchmark
  test_n: 150 # M3 — eval split on winning benchmark only

pool:
  deployment_scenario: homogeneous_pool
  M_lo: meta-llama/Llama-3.2-3B-Instruct
  M_hi: meta-llama/Llama-3.1-8B-Instruct
  kappa: null

protocol:
  protocol_version: mcq_letter_v1
  system_prompt: |
    You answer multiple-choice questions.

    Rules:
    - Read the question and all options carefully.
    - Reply with exactly one line containing only the letter label of the correct option (A, B, C, …).
    - Do not include explanation, punctuation, or any other text.
  user_template: |
    {question}

    {choices}

    Answer:
  decoding:
    temperature: 0.0
    max_tokens: 16
  grading:
    method: mcq

gates:
  min_accuracy_gap: 0.03 # Gate C: min Acc(M_hi) - Acc(M_lo) on holdout
  opportunity_min: 0.05 # Gate D: min P(opportunity bucket)
  too_hard_max: 0.70 # Gate D: max P(too_hard bucket)
  # Paper: thresholds exclude degenerate settings (equivalent models, almost no
  # routing events, almost nothing solvable by M_hi) — not optimize routing performance.

selection:
  tie_break:
    order:
      - acc_gap
      - opportunity_rate
    prefer:
      - ARC-Challenge
      - MMLU
      - TruthfulQA-MC
      - HellaSwag
