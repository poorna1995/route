# Draft defaults for query-derived φ(q) pipeline (architecture frozen; tune at M3 lock).
# Layer: model-independent (query-derived) — H1; no pool forward pass at extraction.
#
# φ(q) = [φ_structural, φ_ambiguity, φ_semantic, φ_embedding_geometry]
#   structural           — 8 scalars (prompt stats + lexical density)
#   ambiguity            — 4 scalars (MCQ distinguishability)
#   semantic             — frozen u(q) in signals/embeddings/{id}.npy (not jsonl columns)
#   embedding_geometry   — 7 scalars (geometry of u(q) relative to R_c; paper may call novelty)

structural:
  mattr_window: 25
  zlib_level: 6

embedding_geometry:
  pca_components: 3   # capped at 3 (pc1–pc3 only)
  knn_k: 10

embedding:
  model_id: sentence-transformers/all-MiniLM-L6-v2
  dimension: 384

tokenizer:
  source: pool_M_lo

zscore:
  continuous_keys:
    - structural.prompt_token_len
    - structural.question_token_len
    - structural.mean_option_token_len
    - structural.std_option_token_len
    - structural.question_option_ratio
    - structural.mattr
    - structural.compression_ratio
    - ambiguity.stem_choice_overlap_max
    - ambiguity.stem_choice_overlap_mean
    - ambiguity.choice_choice_overlap
    - ambiguity.choice_length_range
    - embedding_geometry.pc1
    - embedding_geometry.pc2
    - embedding_geometry.pc3
    - embedding_geometry.centroid_distance
    - embedding_geometry.knn_distance
    - embedding_geometry.mean_knn_similarity
    - embedding_geometry.lof_score
